<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion Admin — Mon École</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    body { background: linear-gradient(135deg, #1e3a5f 0%, #1a56db 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-box {
      background: var(--white);
      border-radius: 16px;
      padding: 2.5rem;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .login-error {
      background: #fef2f2;
      color: #dc2626;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      margin-bottom: 1rem;
      font-size: 0.9rem;
      display: none;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <div style="text-align:center;margin-bottom:2rem;">
      <div style="font-size:3rem;margin-bottom:0.5rem;">🏫</div>
      <h1 style="font-size:1.5rem;font-weight:700;color:var(--text);">Espace Administration</h1>
      <p style="color:var(--text-light);font-size:0.9rem;">Connectez-vous pour gérer le site</p>
    </div>

    <div class="login-error" id="loginError"></div>

    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label>Nom d'utilisateur</label>
        <input type="text" id="username" required placeholder="admin" autocomplete="username" autofocus>
      </div>

      <div class="form-group">
        <label>Mot de passe</label>
        <input type="password" id="password" required placeholder="••••••••" autocomplete="current-password">
      </div>

      <button type="submit" class="btn btn-primary" style="width:100%;margin-top:0.5rem;" id="loginBtn">
        Se connecter 🔐
      </button>
    </form>

    <div style="text-align:center;margin-top:1.5rem;">
      <a href="/" style="color:var(--text-light);font-size:0.85rem;text-decoration:none;">← Retour au site</a>
    </div>
  </div>

  <script>
    async function handleLogin(event) {
      event.preventDefault();
      const btn = document.getElementById('loginBtn');
      const error = document.getElementById('loginError');
      error.style.display = 'none';

      btn.disabled = true;
      btn.textContent = 'Connexion en cours...';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('username').value,
            password: document.getElementById('password').value
          })
        });
        const data = await res.json();

        if (data.success) {
          localStorage.setItem('admin_token', data.data.token);
          window.location.href = '/admin/dashboard.html';
        } else {
          error.textContent = data.error || 'Identifiants invalides';
          error.style.display = 'block';
        }
      } catch (err) {
        error.textContent = 'Erreur de connexion au serveur';
        error.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Se connecter 🔐';
      }
    }

    // Vérifier si déjà connecté
    document.addEventListener('DOMContentLoaded', () => {
      const token = localStorage.getItem('admin_token');
      if (token) {
        fetch('/api/auth/me', { headers: { Authorization: `Bearer ${token}` } })
          .then(r => r.json())
          .then(d => { if (d.success) window.location.href = '/admin/dashboard.html'; })
          .catch(() => {});
      }
    });
  </script>
</body>
</html>
