<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Messages — Administration</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="admin-layout">
    <aside class="admin-sidebar" id="sidebar">
      <div style="margin-bottom:2rem;padding:0.5rem;">
        <div style="font-size:2rem;text-align:center;">🏫</div>
        <div id="sidebarSchoolName" style="text-align:center;font-weight:600;margin-top:0.5rem;">Admin</div>
      </div>
      <nav id="sidebarNav"></nav>
      <div style="margin-top:auto;padding-top:2rem;">
        <button onclick="logout()" style="width:100%;padding:0.75rem;background:#1f2937;color:#9ca3af;border:none;border-radius:8px;cursor:pointer;font-size:0.9rem;">🚪 Déconnexion</button>
      </div>
    </aside>
    <main class="admin-main">
      <h1 style="font-size:1.5rem;font-weight:700;margin-bottom:1rem;">✉️ Messages de contact</h1>
      <div id="messages"><div class="loading">Chargement...</div></div>
    </main>
  </div>
  <script>
    const API = '/api';
    const token = localStorage.getItem('admin_token');
    function authHeaders() { return { Authorization: `Bearer ${token}` }; }

    async function checkAuth() {
      if (!token) { window.location.href = '/admin/login.html'; return false; }
      try { const r = await fetch(`${API}/auth/me`, { headers: authHeaders() }); return (await r.json()).success; }
      catch { window.location.href = '/admin/login.html'; return false; }
    }

    function logout() { fetch(`${API}/auth/logout`, { method: 'POST' }).catch(() => {}); localStorage.removeItem('admin_token'); window.location.href = '/admin/login.html'; }

    function buildSidebar() {
      const pages = ['dashboard','settings','content','news-manager','gallery-manager','contacts','system'];
      const icons = ['📊','⚙️','📄','📝','🖼️','✉️','🔧'];
      const labels = ['Dashboard','Paramètres','Pages','Actualités','Galerie','Messages','Système'];
      document.getElementById('sidebarNav').innerHTML = pages.map((p,i) => `<a href="/admin/${p}.html" style="display:flex;align-items:center;gap:0.5rem;padding:0.75rem 1rem;color:${p==='contacts'?'var(--white)':'#9ca3af'};text-decoration:none;border-radius:8px;background:${p==='contacts'?'var(--primary)':'transparent'};margin-bottom:0.25rem;">${icons[i]} ${labels[i]}</a>`).join('');
    }

    async function loadMessages() {
      try {
        const res = await fetch(`${API}/contact`, { headers: authHeaders() });
        const data = await res.json();
        if (!data.success) { document.getElementById('messages').innerHTML = '<p class="empty-state">Aucun message.</p>'; return; }
        document.getElementById('messages').innerHTML = data.data.length ? data.data.map((m,i) => `
          <div style="background:var(--white);border:1px solid var(--border);border-radius:12px;padding:1.5rem;margin-bottom:1rem;${!m.is_read ? 'border-left:4px solid var(--primary);' : ''}">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.5rem;">
              <strong style="font-size:1.1rem;">${m.name} ${!m.is_read ? '<span style="font-size:0.7rem;background:var(--primary);color:white;padding:0.15rem 0.5rem;border-radius:50px;margin-left:0.5rem;">NOUVEAU</span>' : ''}</strong>
              <span style="font-size:0.8rem;color:var(--text-light);">${new Date(m.created_at).toLocaleString('fr-FR')}</span>
            </div>
            <p style="font-size:0.9rem;color:var(--text-light);margin:0.25rem 0;">📧 ${m.email} ${m.phone ? ' · 📞 '+m.phone : ''} ${m.subject ? ' · Sujet : '+m.subject : ''}</p>
            <p style="font-size:0.95rem;margin:0.75rem 0;line-height:1.7;">${m.message}</p>
            ${!m.is_read ? `<button onclick="markRead(${m.id})" class="btn btn-primary" style="font-size:0.8rem;padding:0.35rem 1rem;">✅ Marquer comme lu</button>` : ''}
          </div>
        `).join('') : '<p class="empty-state">Aucun message pour le moment.</p>';
      } catch(e) {
        document.getElementById('messages').innerHTML = '<p class="empty-state">Aucun message pour le moment.</p>';
      }
    }

    async function markRead(id) {
      await fetch(`${API}/contact/${id}/read`, { method: 'PUT', headers: authHeaders() });
      loadMessages();
    }

    window.logout = logout;
    window.markRead = markRead;

    document.addEventListener('DOMContentLoaded', async () => {
      if (!(await checkAuth())) return;
      buildSidebar();
      loadMessages();
    });
  </script>
</body>
</html>
