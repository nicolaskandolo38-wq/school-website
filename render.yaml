services:
  - type: web
    name: school-website
    runtime: node
    plan: free
    buildCommand: npm install && node database/init.js
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: SESSION_SECRET
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_PATH
        sync: false
      - key: ADMIN_GATE_PASSWORD
        sync: false
